name: build-and-release
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Site
        run: |
          npm install @osmoscraft/osmosfeed
          npx @osmoscraft/osmosfeed build
          # This creates a dummy index if the build fails, to prevent the tar error
          if [ ! -d "dist" ]; then 
            mkdir dist
            echo "Build failed to generate content. Check your osmosfeed.yaml for errors." > dist/index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
