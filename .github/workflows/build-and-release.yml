name: build-and-release
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # This will now update your news every hour automatically

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Required to fix the ERR_INVALID_ARG_TYPE error

      - name: Build Site
        run: |
          npm install @osmoscraft/osmosfeed
          npx @osmoscraft/osmosfeed build
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public # The log confirms the engine writes to 'public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
