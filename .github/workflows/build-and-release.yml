name: build-and-release
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Fixed: Now meets the requirement of the news engine

      - name: Build News Site
        run: |
          npm install @osmoscraft/osmosfeed
          npx @osmoscraft/osmosfeed build
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public # Fixed: Matches where the log says it wrote the files

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
